<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos de Coches</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Barra de navegación -->
    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Buscar Coches</a></li>
            <li><a href="#">Vender</a></li>
            <li><a href="#">Ayuda</a></li>
        </ul>
    </nav>

    <!-- Formulario de búsqueda -->
    <section class="search-form">
        <h1>Busca tu coche ideal</h1>
        <form>
            <input type="text" id="marca" placeholder="Marca">
            <input type="text" id="modelo" placeholder="Modelo">
            <input type="number" id="precio-min" placeholder="Precio Mínimo">
            <input type="number" id="precio-max" placeholder="Precio Máximo">
            <button type="submit">Buscar</button>
        </form>
    </section>

    <!-- Resultados de búsqueda -->
    <section class="results">
        <h2>Resultados de la búsqueda</h2>
        <div class="car-list">
            <!-- Coche 1 -->
            <div class="car-item">
                <img src="https://via.placeholder.com/150" alt="Coche 1">
                <div class="car-details">
                    <h3>Marca Modelo</h3>
                    <p>Precio: 15.000€</p>
                    <p>Ubicación: Madrid</p>
                    <button>Ver Detalles</button>
                </div>
            </div>
            <!-- Coche 2 -->
            <div class="car-item">
                <img src="https://via.placeholder.com/150" alt="Coche 2">
                <div class="car-details">
                    <h3>Marca Modelo</h3>
                    <p>Precio: 18.500€</p>
                    <p>Ubicación: Barcelona</p>
                    <button>Ver Detalles</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Base de Datos de Coches</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
